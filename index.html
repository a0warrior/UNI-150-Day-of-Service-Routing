<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNI 150 Day of Service</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Merriweather:wght@700;900&display=swap');

    :root {
      --bg:       #1a0a2e;
      --panel:    #2a1045;
      --border:   #3d1a63;
      --accent-a: #FFB81C;
      --accent-b: #c084fc;
      --text:     #f5f0ff;
      --muted:    #9d85b5;
      --card:     #220d38;
      --done:     #1f1035;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #4B116F;
      border-bottom: 3px solid #FFB81C;
      flex-shrink: 0;
      z-index: 1000;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .uni-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .uni-wordmark {
      font-family: 'Merriweather', serif;
      font-size: 22px;
      font-weight: 900;
      color: white;
      letter-spacing: 0.04em;
      font-style: italic;
    }

    .uni-divider {
      width: 2px;
      height: 32px;
      background: #FFB81C;
    }

    .logo {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #FFB81C;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .stats { display: flex; gap: 16px; }

    .stat {
      text-align: right;
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat strong {
      display: block;
      font-size: 15px;
      color: #FFB81C;
      letter-spacing: 0;
      font-weight: 700;
    }

    .tab-bar {
      display: flex;
      background: #2a1045;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 1000;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active-a { color: #FFB81C; border-bottom-color: #FFB81C; background: rgba(255,184,28,0.06); }
    .tab-btn.active-b { color: #c084fc; border-bottom-color: #c084fc; background: rgba(192,132,252,0.06); }

    .tab-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tab-dot-a { background: #FFB81C; box-shadow: 0 0 5px #FFB81C; }
    .tab-dot-b { background: #c084fc; box-shadow: 0 0 5px #c084fc; }

    .main { display: flex; flex: 1; overflow: hidden; position: relative; }

    .sidebar {
      width: 290px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      z-index: 500;
      transition: transform 0.3s ease, width 0.3s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
      width: 0;
      border-right: none;
    }

    .sidebar-toggle {
      position: absolute;
      top: 50%;
      left: 290px;
      transform: translateY(-50%);
      z-index: 600;
      width: 22px;
      height: 48px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: left 0.3s ease;
      color: var(--muted);
      font-size: 12px;
    }

    .sidebar-toggle:hover { color: var(--text); background: var(--card); }
    .sidebar-toggle.collapsed { left: 0; }

    .sidebar-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .progress-text { font-size: 10px; color: var(--muted); font-weight: 600; }
    .progress-bar-wrap { height: 3px; background: var(--border); flex-shrink: 0; }

    .progress-bar-fill {
      height: 3px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-bar-fill.color-a { background: #FFB81C; }
    .progress-bar-fill.color-b { background: #c084fc; }

    .route-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .route-list::-webkit-scrollbar { width: 4px; }
    .route-list::-webkit-scrollbar-track { background: transparent; }
    .route-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .route-item {
      padding: 9px 14px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .route-item:hover { background: var(--card); }
    .route-item.active { background: var(--card); }
    .route-item.origin-a { border-left-color: #FFB81C; }
    .route-item.origin-b { border-left-color: #c084fc; }

    .route-item.completed {
      background: var(--done);
      border-left-color: var(--muted) !important;
      opacity: 0.5;
    }

    .route-item.completed .route-dest {
      text-decoration: line-through;
      color: var(--muted);
    }

    .check-wrap { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

    .check-wrap input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--muted);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .check-wrap input[type="checkbox"]:checked {
      background: #FFB81C;
      border-color: #FFB81C;
    }

    .check-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #1a0a2e;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .route-number {
      font-family: 'Merriweather', serif;
      font-size: 11px;
      font-weight: 700;
      min-width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .route-number.color-a { color: #FFB81C; }
    .route-number.color-b { color: #c084fc; }

    .route-info { flex: 1; min-width: 0; }

    .route-dest {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
      transition: color 0.2s;
    }

    .route-meta { display: flex; gap: 8px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }

    .map-panel { flex: 1; position: relative; display: none; }
    .map-panel.active { display: flex; }
    .map-el { flex: 1; z-index: 1; }

    .leaflet-popup-content-wrapper {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .leaflet-popup-tip { background: var(--card); }

    .leaflet-popup-content {
      margin: 14px 18px;
      font-family: 'Source Sans 3', sans-serif;
    }

    .popup-title {
      font-family: 'Merriweather', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }

    .popup-field {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
    }

    .popup-field strong {
      display: block;
      font-size: 12px;
      color: var(--text);
      margin-top: 2px;
      letter-spacing: 0;
      text-transform: none;
      font-weight: 600;
    }

    .popup-maps-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 0;
      background: #4B116F;
      border: 1px solid #FFB81C;
      color: #FFB81C;
      text-decoration: none;
      border-radius: 4px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .popup-maps-btn:hover { background: #FFB81C; color: #4B116F; }

    .leaflet-container { background: #1a0a2e; }

    .reset-btn {
      margin: 10px 14px 14px;
      padding: 8px 0;
      width: calc(100% - 28px);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .reset-btn:hover {
      border-color: #FFB81C;
      color: #FFB81C;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="uni-logo">
      <div class="uni-wordmark">UNI</div>
      <div class="uni-divider"></div>
    </div>
    <div class="logo">150 Day of Service — Route Map</div>
  </div>
  <div class="stats">
    <div class="stat"><strong id="stat-total">—</strong>Routes</div>
    <div class="stat"><strong id="stat-beds">—</strong>Total Beds</div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active-a" id="tab-a" onclick="switchTab('A')">
    <div class="tab-dot tab-dot-a"></div>
    Origin A — UNI Commons
  </button>
  <button class="tab-btn" id="tab-b" onclick="switchTab('B')">
    <div class="tab-dot tab-dot-b"></div>
    Origin B — Foster's Mattress
  </button>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span id="sidebar-label">Origin A — Delivery Stops</span>
      <span class="progress-text" id="progress-text">0 / 0</span>

    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill color-a" id="progress-bar"></div>
    </div>
    <div class="route-list" id="route-list"></div>
    <button class="reset-btn" onclick="resetProgress()">&#x21BA; Reset Progress</button>
  </div>

  <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">&#8249;</button>

  <div class="map-panel active" id="panel-a">
    <div id="map-a" class="map-el"></div>
  </div>
  <div class="map-panel" id="panel-b">
    <div id="map-b" class="map-el"></div>
  </div>
</div>

  function pinIcon(color, label, isOrigin, origin) {
    const size     = isOrigin ? 36 : 30;
    const fontSize = isOrigin ? 13 : 11;
    const uid      = (origin || '') + label;  // unique ID per origin+label combo
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${Math.round(size*1.35)}" viewBox="0 0 30 40">
      <defs><filter id="sh${uid}" x="-30%" y="-20%" width="160%" height="160%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.6)"/>
      </filter></defs>
      <path d="M15 0 C6.7 0 0 6.7 0 15 C0 26 15 40 15 40 C15 40 30 26 30 15 C30 6.7 23.3 0 15 0 Z"

      <circle cx="15" cy="14" r="8" fill="#1a0a2e" opacity="0.95"/>
      <text x="15" y="19" text-anchor="middle" font-family="'Merriweather',serif"
            font-weight="900" font-size="${fontSize}" fill="${color}">${label}</text>

      iconSize:    [size, Math.round(size * 1.35)],
      iconAnchor:  [size / 2, Math.round(size * 1.35)],

    maps[origin] = m;

    if (features.length > 0) {
      const firstCoords  = features[0].geometry.coordinates;
      const originLatLng = [firstCoords[0][1], firstCoords[0][0]];
      L.marker(originLatLng, { icon: pinIcon(color, origin, true, origin), zIndexOffset: 1000 })
        .bindPopup(buildOriginPopup(originLabel, originAddr), { maxWidth: 320 })
        .addTo(m);
    }

    features.forEach((f, i) => {
      const props      = f.properties;
      const latlngs    = f.geometry.coordinates.map(([lng, lat]) => [lat, lng]);
      const destLatLng = latlngs[latlngs.length - 1];

      const line       = L.polyline(latlngs, { color, weight: 3, opacity: 0.85 }).addTo(m);
      const destMarker = L.marker(destLatLng, { icon: pinIcon(color, i + 1, false, origin) }).addTo(m);

      const popupHTML = buildPopup(props, origin, originLabel);
      line.bindPopup(popupHTML, { maxWidth: 320 });
      destMarker.bindPopup(popupHTML, { maxWidth: 320 });

      line.on('mouseover', function() { if (selectedIndex[origin] !== i) this.setStyle({ weight: 5 }); });
      line.on('mouseout',  function() { if (selectedIndex[origin] !== i) this.setStyle({ weight: 3 }); });
      line.on('click',       () => selectRoute(origin, i));
      destMarker.on('click', () => selectRoute(origin, i));

      layers[origin].push({ line, destMarker, props, latlngs, color });
    });

    // Re-apply saved checked state to map layers
    features.forEach((f, i) => {
      if (checked[origin][i]) {
        layers[origin][i].line.setStyle({ color: GRAY, opacity: 0.3 });
        layers[origin][i].destMarker.setIcon(pinIcon(GRAY, i + 1, false, origin));
      }
    });

    mapsInitialized[origin] = true;
  }

  function selectRoute(origin, index) {
    if (selectedIndex[origin] !== null) {
      const prevColor = checked[origin][selectedIndex[origin]] ? GRAY : (origin === 'A' ? COLOR_A : COLOR_B);
      layers[origin][selectedIndex[origin]].line.setStyle({ weight: 3, color: prevColor });
      document.getElementById(`item-${origin}-${selectedIndex[origin]}`)?.classList.remove('active');
    }
    selectedIndex[origin] = index;
    const { line, latlngs } = layers[origin][index];
    line.setStyle({ weight: 5 });
    line.openPopup();
    document.getElementById(`item-${origin}-${index}`)?.classList.add('active');
    document.getElementById(`item-${origin}-${index}`)?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    maps[origin].fitBounds(L.latLngBounds(latlngs), { padding: [40, 40] });
  }

  function buildSidebar(origin) {
    const features   = origin === 'A' ? featuresA : featuresB;
    const colorClass = origin === 'A' ? 'color-a' : 'color-b';
    const listEl     = document.getElementById('route-list');
    listEl.innerHTML = '';

    features.forEach((f, i) => {
      const props  = f.properties;
      const isDone = checked[origin] && checked[origin][i];
      const item   = document.createElement('div');
      item.className = `route-item origin-${origin.toLowerCase()}${isDone ? ' completed' : ''}`;
      item.id = `item-${origin}-${i}`;
      item.innerHTML = `
        <div class="check-wrap">
          <input type="checkbox" id="chk-${origin}-${i}" ${isDone ? 'checked' : ''}/>
        </div>
        <div class="route-number ${colorClass}">${i + 1}</div>
        <div class="route-info">
          <div class="route-dest">${props.destination}</div>
          <div class="route-meta">
            <span>${props.beds} beds</span>
            <span>${props.distance}</span>
            <span>${props.duration}</span>
          </div>
        </div>`;

      const chk = item.querySelector('input[type="checkbox"]');
      chk.addEventListener('change', (e) => {
        e.stopPropagation();
        toggleChecked(origin, i, e.target.checked);
      });
      item.addEventListener('click', (e) => {
        if (e.target.type === 'checkbox') return;
        selectRoute(origin, i);
      });
      listEl.appendChild(item);
    });

    updateProgress(origin);
  }

  function switchTab(origin) {
    currentTab = origin;
    document.getElementById('tab-a').className = 'tab-btn' + (origin === 'A' ? ' active-a' : '');
    document.getElementById('tab-b').className = 'tab-btn' + (origin === 'B' ? ' active-b' : '');
    document.getElementById('panel-a').classList.toggle('active', origin === 'A');
    document.getElementById('panel-b').classList.toggle('active', origin === 'B');
    document.getElementById('sidebar-label').textContent =
      origin === 'A' ? 'Origin A — Delivery Stops' : 'Origin B — Delivery Stops';
    const bar = document.getElementById('progress-bar');
    bar.className = 'progress-bar-fill ' + (origin === 'A' ? 'color-a' : 'color-b');
    buildSidebar(origin);
    if (!mapsInitialized[origin]) {
      buildMap(origin);
    } else {
      setTimeout(() => maps[origin].invalidateSize(), 50);
    }
  }

  // ── Save & Restore progress ──
  const STORAGE_KEY = 'uni150_progress';

  function saveProgress() {
    // Save to Firebase for real-time sync across all devices
    const data = { A: checked['A'], B: checked['B'] };
    set(ref(db, 'progress'), data).catch(e => console.warn('Firebase save failed:', e));
    // Show saved indicator
    const ind = document.getElementById('saved-indicator');
    if (ind) {
      ind.style.opacity = '1';
      clearTimeout(ind._t);
      ind._t = setTimeout(() => { ind.style.opacity = '0'; }, 1500);
    }
  }

  function loadProgress() {
    // Listen for real-time updates from Firebase
    onValue(ref(db, 'progress'), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      if (Array.isArray(data.A) && data.A.length === featuresA.length) {
        checked['A'] = data.A;
      }
      if (Array.isArray(data.B) && data.B.length === featuresB.length) {
        checked['B'] = data.B;
      }
      // Re-apply state to whichever map is currently visible
      ['A', 'B'].forEach(origin => {
        if (!mapsInitialized[origin]) return;
        const features = origin === 'A' ? featuresA : featuresB;
        const color    = origin === 'A' ? COLOR_A : COLOR_B;
        features.forEach((f, i) => {
          const isDone = checked[origin][i];
          if (layers[origin][i]) {
            layers[origin][i].line.setStyle({ color: isDone ? GRAY : color, opacity: isDone ? 0.3 : 0.85 });
            layers[origin][i].destMarker.setIcon(pinIcon(isDone ? GRAY : color, i + 1, false, origin));
          }
          const item = document.getElementById('item-' + origin + '-' + i);
          if (item) item.classList.toggle('completed', isDone);
          const chk = document.getElementById('chk-' + origin + '-' + i);
          if (chk) chk.checked = isDone;
        });
        updateProgress(origin);
      });
    });
  }

  function resetProgress() {
    if (!confirm('Reset all progress? This cannot be undone.')) return;
    checked['A'] = new Array(featuresA.length).fill(false);
    checked['B'] = new Array(featuresB.length).fill(false);
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}

    // Re-apply gray/color to all layers
    ['A', 'B'].forEach(origin => {
      const color = origin === 'A' ? COLOR_A : COLOR_B;
      layers[origin].forEach((layer, i) => {
        layer.line.setStyle({ color, opacity: 0.85 });
        layer.destMarker.setIcon(pinIcon(color, i + 1, false, origin));
      });
    });

    buildSidebar(currentTab);
  }

  const totalBeds = geojson.features.reduce((s, f) => s + f.properties.beds, 0);
  document.getElementById('stat-total').textContent = geojson.features.length;
  document.getElementById('stat-beds').textContent  = totalBeds;

  // Pre-initialize checked arrays before loading saved state
  checked['A'] = new Array(featuresA.length).fill(false);
  checked['B'] = new Array(featuresB.length).fill(false);
  loadProgress();

  buildMap('A');
  buildSidebar('A');

  // Firebase handles persistence — no need for beforeunload save

</script>
</body>
</html>
